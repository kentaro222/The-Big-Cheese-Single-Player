<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Big Cheese - Single Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        
        body {
            font-family: 'DotGothic16', sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            overflow-x: hidden;
            image-rendering: pixelated;
        }

        .pixel-border {
            border: 4px solid #000;
            box-shadow: 4px 4px 0px #000;
        }

        .card {
            width: 160px;
            height: 160px;
            background-color: #f1c40f;
            background-size: cover;
            background-position: center;
            color: #000;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 0.2s;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.7), -1px -1px 0 rgba(255,255,255,0.7), 1px -1px 0 rgba(255,255,255,0.7), -1px 1px 0 rgba(255,255,255,0.7);
        }

        .card-wip {
            width: 100px;
            height: 100px;
            background-color: #ecf0f1;
            text-shadow: none;
        }

        .text-bg-plate {
            background: rgba(255, 255, 255, 0.8);
            padding: 0 4px;
            border-radius: 4px;
        }

        .mouse-icon {
            width: 16px;
            height: 16px;
            background-color: #95a5a6; 
            border-radius: 3px;
            display: inline-block;
            margin: 1px;
            border: 1px solid #7f8c8d;
            background-repeat: no-repeat;
            background-position: left center;
        }

        .mouse-icon.has-sprite {
            background-color: transparent;
            border: none;
            background-size: 48px 16px;
            background-position: 0 0;
        }

        .mouse-icon.walking {
            animation: mouse-walk 0.6s step-end infinite;
        }

        @keyframes mouse-walk {
            0% { background-position: 0 0; }
            25% { background-position: -16px 0; }
            50% { background-position: 0 0; }
            75% { background-position: -32px 0; }
            100% { background-position: 0 0; }
        }

        .score-mouse {
            transform: scaleX(-2) scaleY(2);
            transform-origin: bottom center;
        }

        .log-box {
            height: 100px;
            overflow-y: auto;
            background: rgba(0,0,0,0.7);
            padding: 8px;
            font-size: 0.75rem;
            border: 2px solid #000;
        }

        .parent-tag {
            background: #e67e22;
            color: white;
            padding: 1px 4px;
            font-size: 10px;
            border-radius: 3px;
            border: 1px solid #000;
            margin-right: 4px;
        }

        .pop { animation: pop 0.3s ease-out; }
        @keyframes pop {
            0% { transform: scale(0.8); }
            100% { transform: scale(1); }
        }
        
        .disabled-ui {
            pointer-events: none;
            opacity: 0.5;
        }
    </style>
</head>
<body class="p-2 sm:p-4">

<div id="app" class="max-w-6xl mx-auto">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-2 sm:gap-6">
        
        <div class="lg:col-span-1 flex flex-col items-center space-y-2">
            <h2 class="text-lg font-bold">現在の競り</h2>
            <div id="auctionArea" class="flex flex-col items-center p-4 bg-gray-800 rounded-xl pixel-border w-full">
                <div id="currentCard" class="card pixel-border text-center p-2 mb-2">
                    <span class="text-3xl font-black" id="cardValue">?</span>
                    <span class="text-xs mt-1" id="cardType">仕事</span>
                </div>
                
                <div id="bidControls" class="w-full space-y-2 transition-opacity">
                    <div class="text-center bg-black bg-opacity-30 p-1.5 rounded">
                        <div class="text-[10px] text-gray-400 mb-0.5">現在の順番</div>
                        <span id="currentBidderName" class="font-bold text-sm">---</span>
                        <div class="text-xs text-yellow-400 mt-0.5">最高入札: <span id="highestBid" class="text-base">0</span> 匹</div>
                        <div id="highestBidderName" class="text-[9px] text-gray-300">(なし)</div>
                    </div>
                    <div class="flex justify-center gap-1.5 flex-wrap">
                        <input type="number" id="bidAmount" class="w-16 text-black p-1 text-sm rounded pixel-border" value="1" min="1">
                        <button onclick="game.placeBid()" class="bg-green-600 px-3 py-1 text-sm rounded pixel-border hover:bg-green-500 font-bold">入札</button>
                        <button onclick="game.passBid()" class="bg-red-600 px-3 py-1 text-sm rounded pixel-border hover:bg-red-500 font-bold">パス</button>
                        <button id="vetoBtn" onclick="game.useVeto()" class="hidden bg-purple-600 px-3 py-1 text-sm rounded pixel-border hover:bg-purple-500 font-bold">却下(VETO)</button>
                    </div>
                </div>
            </div>
            
            <div class="log-box w-full rounded" id="gameLog">
                <div class="text-gray-400">> ゲームを開始しました。</div>
            </div>
        </div>

        <div class="lg:col-span-2">
            <h2 class="text-lg font-bold mb-2">プレイヤー一覧</h2>
            <div id="playerList" class="grid grid-cols-1 md:grid-cols-2 gap-2"></div>
        </div>

    </div>

    <!-- リセットボタン -->
    <div class="mt-8 text-center border-t border-gray-600 pt-4 pb-8">
        <button onclick="confirmReset()" class="text-xs text-gray-400 hover:text-gray-200 underline decoration-gray-500 transition-colors">進行状態をリセットして最初から遊ぶ</button>
    </div>
</div>

<div id="modalOverlay" class="fixed inset-0 bg-black bg-opacity-80 hidden flex items-center justify-center z-50">
    <div class="bg-white text-black p-6 rounded-xl pixel-border text-center max-w-sm w-[90%]">
        <h2 id="modalTitle" class="text-xl font-bold mb-2">仕事完了！</h2>
        <div id="diceDisplay" class="text-5xl font-black my-6 text-blue-600">?</div>
        <div id="rerollArea" class="hidden mb-4">
            <button onclick="game.useBigCheese()" class="bg-yellow-500 text-black px-4 py-2 rounded-lg pixel-border font-bold text-sm hover:bg-yellow-400">
                ビッグ・チーズで振り直す！
            </button>
        </div>
        <button id="modalOkBtn" onclick="game.closeModal()" class="bg-blue-600 text-white px-6 py-2 rounded pixel-border font-bold text-sm">OK</button>
    </div>
</div>

<!-- リセット確認用モーダル -->
<div id="resetModalOverlay" class="fixed inset-0 bg-black bg-opacity-80 hidden flex items-center justify-center z-50">
    <div class="bg-white text-black p-6 rounded-xl pixel-border text-center max-w-sm w-[90%]">
        <h2 class="text-xl font-bold mb-4 text-red-600">ゲームのリセット</h2>
        <p class="text-sm mb-6 font-bold text-gray-700">現在の進行状態がすべて削除され、最初からやり直しになります。<br>本当によろしいですか？</p>
        <div class="flex justify-center gap-4">
            <button onclick="cancelReset()" class="bg-gray-400 text-white px-4 py-2 rounded pixel-border font-bold text-sm hover:bg-gray-500 transition-colors">キャンセル</button>
            <button onclick="executeReset()" class="bg-red-600 text-white px-4 py-2 rounded pixel-border font-bold text-sm hover:bg-red-500 transition-colors">リセット</button>
        </div>
    </div>
</div>

<script>
function confirmReset() {
    document.getElementById('resetModalOverlay').classList.remove('hidden');
}

function cancelReset() {
    document.getElementById('resetModalOverlay').classList.add('hidden');
}

function executeReset() {
    localStorage.removeItem('bigCheeseSave');
    location.reload();
}

const PLAYER_COLORS = ['#e74c3c', '#3498db', '#2ecc71', '#f1c40f', '#9b59b6', '#e67e22'];
const WIN_SCORE = 40;
const CARD_TYPES = {
    NORMAL: 'NORMAL',
    VETO: 'VETO',
    BIG_CHEESE: 'BIG_CHEESE'
};

class Game {
    constructor() {
        this.players = [];
        this.deck = [];
        this.currentCard = null;
        this.parentIdx = 0; 
        this.auction = {
            highestBid: 0,
            highestBidder: null,
            activePlayerIdx: 0,
            participants: [] 
        };
        this.log = document.getElementById('gameLog');
        this.cpuTimer = null;
        this.init();
    }

    init() {
        if (this.loadState()) {
            this.updateUI();
            return; 
        }

        for (let i = 0; i < 5; i++) {
            this.players.push({
                id: i,
                name: i === 0 ? "あなた" : `CPU ${i}`,
                isCPU: i !== 0,
                color: PLAYER_COLORS[i],
                mice: 10,
                score: 0,
                wip: [],
                inventory: []
            });
        }

        const diceValues = [2, 4, 6, 8, 10, 12, 20];
        diceValues.forEach(v => {
            for(let i=0; i<4; i++) this.deck.push({ type: CARD_TYPES.NORMAL, value: v });
        });
        for(let i=0; i<4; i++) this.deck.push({ type: CARD_TYPES.VETO, value: 0 });
        for(let i=0; i<4; i++) this.deck.push({ type: CARD_TYPES.BIG_CHEESE, value: 0 });
        
        this.shuffle(this.deck);
        this.parentIdx = Math.floor(Math.random() * this.players.length);
        
        this.startNewRound();
    }

    saveState() {
        if (this.players.some(p => p.score >= WIN_SCORE)) return;

        const state = {
            players: this.players,
            deck: this.deck,
            currentCard: this.currentCard,
            parentIdx: this.parentIdx,
            auction: this.auction,
            logHtml: this.log.innerHTML
        };
        localStorage.setItem('bigCheeseSave', JSON.stringify(state));
    }

    loadState() {
        const saved = localStorage.getItem('bigCheeseSave');
        if (saved) {
            try {
                const state = JSON.parse(saved);
                this.players = state.players;
                this.deck = state.deck;
                this.currentCard = state.currentCard;
                this.parentIdx = state.parentIdx;
                this.auction = state.auction;
                if (state.logHtml) {
                    this.log.innerHTML = state.logHtml;
                }
                this.addLog("進行状態を復元し、再開しました。", "system");
                return true;
            } catch(e) {
                console.error("セーブデータの読み込みに失敗しました:", e);
            }
        }
        return false;
    }

    shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    startNewRound() {
        clearTimeout(this.cpuTimer); 
        
        if (this.deck.length === 0) {
            this.addLog("山札を再作成します。", "system");
            const diceValues = [2, 4, 6, 8, 10, 12, 20];
            diceValues.forEach(v => {
                for(let i=0; i<2; i++) this.deck.push({ type: CARD_TYPES.NORMAL, value: v });
            });
            this.shuffle(this.deck);
        }

        this.currentCard = this.deck.pop();
        
        this.auction = {
            highestBid: 0,
            highestBidder: null,
            activePlayerIdx: this.parentIdx,
            participants: this.players.map((_, i) => i)
        };

        this.addLog(`親: ${this.players[this.parentIdx].name}。競り開始。`, "system");
        this.updateUI(); 
    }

    getCardName(card) {
        if (card.type === CARD_TYPES.NORMAL) return `${card.value}面体`;
        if (card.type === CARD_TYPES.VETO) return `却下(VETO)`;
        return `ビッグ・チーズ`;
    }

    getCardImageUrl(card) {
        if (card.type === CARD_TYPES.NORMAL) {
            if (card.value === 2) return 'Card_2.png';
            if (card.value === 4) return 'Card_4.png';
            if (card.value === 6) return 'Card_6.png';
            if (card.value === 8) return 'Card_8.png';
            if (card.value === 10) return 'Card_10.png';
            if (card.value === 12) return 'Card_12.png';
            if (card.value === 20) return 'Card20.png';
        }
        if (card.type === CARD_TYPES.VETO) return 'Card_Veto.png';
        if (card.type === CARD_TYPES.BIG_CHEESE) return 'Card_TheBigCheese.png';
        return ""; 
    }

    getMouseImageUrl() {
        return "Mouse_sheet.png";
    }

    updateUI() {
        const cardValEl = document.getElementById('cardValue');
        const cardTypeEl = document.getElementById('cardType');
        const cardObj = document.getElementById('currentCard');
        
        if (this.currentCard.type === CARD_TYPES.NORMAL) {
            cardValEl.innerText = this.currentCard.value;
            cardTypeEl.innerText = "仕事";
            cardObj.style.backgroundColor = "#f1c40f";
        } else {
            cardValEl.innerText = this.currentCard.type === CARD_TYPES.VETO ? "V" : "B";
            cardTypeEl.innerText = "特殊";
            cardObj.style.backgroundColor = "#9b59b6";
        }

        const imgUrl = this.getCardImageUrl(this.currentCard);
        if (imgUrl) {
            cardObj.style.backgroundImage = `url('${imgUrl}')`;
            cardValEl.style.display = 'none';
            cardTypeEl.style.display = 'none';
        } else {
            cardObj.style.backgroundImage = "none";
            cardValEl.style.display = 'block';
            cardTypeEl.style.display = 'block';
        }

        const activePlayer = this.players[this.auction.activePlayerIdx];
        document.getElementById('currentBidderName').innerText = activePlayer.name;
        document.getElementById('currentBidderName').style.color = activePlayer.color;
        document.getElementById('highestBid').innerText = this.auction.highestBid;
        document.getElementById('highestBidderName').innerText = this.auction.highestBidder ? `(${this.auction.highestBidder.name})` : "(なし)";
        
        document.getElementById('bidAmount').min = this.auction.highestBid + 1;
        document.getElementById('bidAmount').value = this.auction.highestBid + 1;

        const hasVeto = activePlayer.inventory.some(c => c.type === CARD_TYPES.VETO);
        const vetoBtn = document.getElementById('vetoBtn');
        vetoBtn.classList.toggle('hidden', !hasVeto);

        const bidControls = document.getElementById('bidControls');

        if (activePlayer.isCPU) {
            bidControls.classList.add('disabled-ui');
            vetoBtn.classList.add('hidden');
            if (!this.cpuTimer) {
                // 考え中を演出するランダムなウェイト
                const thinkTime = 800 + Math.random() * 800;
                this.cpuTimer = setTimeout(() => this.processCPUTurn(), thinkTime);
            }
        } else {
            bidControls.classList.remove('disabled-ui');
            clearTimeout(this.cpuTimer);
            this.cpuTimer = null;
        }

        this.renderPlayers();
        this.saveState();
    }

    // ★★★ ニート回避＆回転率重視のリアル思考AI ★★★
    processCPUTurn() {
        this.cpuTimer = null;
        const cpu = this.players[this.auction.activePlayerIdx];
        const requiredBid = this.auction.highestBid + 1;
        const currentCard = this.currentCard;

        // 盤面状況
        const remainingToWin = WIN_SCORE - cpu.score;
        const topPlayer = this.players.reduce((prev, current) => (prev.score > current.score) ? prev : current);
        const isTop = topPlayer.id === cpu.id;
        const topRemaining = WIN_SCORE - topPlayer.score;
        const topIsWinningAuction = this.auction.highestBidder && this.auction.highestBidder.id === topPlayer.id;

        const otherPlayers = this.auction.participants.filter(id => id !== cpu.id).map(id => this.players[id]);
        const maxRivalMice = otherPlayers.length > 0 ? Math.max(...otherPlayers.map(p => p.mice)) : 0;

        const hasBigCheese = cpu.inventory.some(c => c.type === CARD_TYPES.BIG_CHEESE);
        const hasVeto = cpu.inventory.some(c => c.type === CARD_TYPES.VETO);

        // 1. 基本となる期待値
        let expectedScore = 0;
        if (currentCard.type === CARD_TYPES.NORMAL) {
            expectedScore = currentCard.value === 2 ? 1.5 : (currentCard.value + 1) / 2;
        }

        // 2. このカードに「いくらまで出せるか（限界額：Max Bid）」の算出
        let maxBid = 0;

        if (currentCard.type === CARD_TYPES.NORMAL) {
            // 基本は期待値（少し強気に切り上げ）
            maxBid = Math.ceil(expectedScore);

            // ① 【ニート回避補正】ネズミを遊ばせておくくらいなら働かせる！
            if (cpu.mice >= 8) {
                maxBid += 3; // 資金潤沢ならかなり強気
            } else if (cpu.mice >= 6) {
                maxBid += 1; // まあまあ強気
            }

            // ② 【回転率補正】小さい仕事はすぐ帰ってくるから高くても良い！
            if (currentCard.value <= 6) {
                maxBid += 2;
            }

            // ③ ビッグチーズ所持ボーナス（12, 20面体の価値が跳ね上がる）
            if (hasBigCheese && currentCard.value >= 12) {
                maxBid += Math.floor(Math.random() * 3) + 2; // +2〜+4のボーナス
            }

            // ④ 逆・拘束リスク（手持ちが少ないのにデカい仕事に手を出すと危険）
            if (currentCard.value >= 12 && !hasBigCheese && cpu.mice <= 5) {
                maxBid -= 2; 
            }

            // ⑤ リーチ補正（自分が勝てそうなら全ツッパ）
            if (currentCard.value >= remainingToWin) {
                maxBid = cpu.mice; 
            }

            // ⑥ 防衛補正（他人が勝てそうなら意地でも阻止）
            if (!isTop && topRemaining <= currentCard.value && topIsWinningAuction) {
                maxBid += Math.floor(Math.random() * 4) + 1; 
            }

            // ⑦ 人間らしい「気まぐれ（ゆらぎ）」
            const mood = Math.floor(Math.random() * 5) - 2; // -2 から +2
            maxBid += mood;

        } else if (currentCard.type === CARD_TYPES.VETO) {
            maxBid = 2; // VETOはほどほど
            if (cpu.mice >= 7) maxBid += 1; // 暇なら買う
            if (this.players.some(p => p.score >= WIN_SCORE - 15)) maxBid += 1; // 終盤は防衛用に価値上昇
            maxBid += Math.floor(Math.random() * 3) - 1; // ゆらぎ -1〜+1
        } else if (currentCard.type === CARD_TYPES.BIG_CHEESE) {
            maxBid = 2;
            if (cpu.mice >= 7) maxBid += 1;
            maxBid += Math.floor(Math.random() * 3) - 1; // ゆらぎ -1〜+1
        }

        // 下限と上限のクリップ
        if (maxBid < 1) maxBid = 1;
        if (maxBid > cpu.mice) maxBid = cpu.mice;

        // 3. VETO(却下)の発動判断
        if (hasVeto) {
            // 防御VETO：トップの上がり阻止
            if (!isTop && topRemaining <= (currentCard.value || 0) && topIsWinningAuction) {
                if (requiredBid > cpu.mice || requiredBid > maxBid) {
                    this.useVeto();
                    return;
                }
            }
            // 嫌がらせVETO：自分は買えないが、美味しいカードを他人が安く持っていきそうな時
            if (requiredBid > cpu.mice && expectedScore >= 4 && this.auction.highestBid <= 2) {
                if (Math.random() < 0.3) { 
                    this.useVeto();
                    return;
                }
            }
        }

        // 4. 入札アクションの実行
        if (requiredBid > cpu.mice) {
            this.passBid();
            return;
        }

        // チキンレース判定（わざと吊り上げるブラフ）
        let tryBluff = false;
        if (requiredBid > maxBid && currentCard.type === CARD_TYPES.NORMAL) {
            // 現在の要求額が適正価格に近く、ライバルの資金に余裕がある場合、相手に削らせる
            if (requiredBid <= expectedScore + 1 && maxRivalMice >= requiredBid + 1) {
                if (Math.random() < 0.4) { 
                    tryBluff = true;
                }
            }
        }

        // 自分のMax Bid以内、またはチキンレースに乗る場合
        if (requiredBid <= maxBid || tryBluff) {
            let bidAmount = requiredBid;
            
            // 資金に余裕がある時、威圧のために「+2〜+3」の一気釣り上げを行ってくる
            if (!tryBluff && maxBid >= requiredBid + 2 && cpu.mice >= requiredBid + 3 && Math.random() < 0.3) {
                const maxJump = Math.min(3, maxBid - requiredBid);
                const jump = Math.floor(Math.random() * maxJump) + 1;
                bidAmount = requiredBid + jump;
            }

            document.getElementById('bidAmount').value = bidAmount;
            this.placeBid();
        } else {
            this.passBid(); // 予算オーバーなら降りる
        }
    }

    renderPlayers() {
        const list = document.getElementById('playerList');
        list.innerHTML = '';
        
        const mouseImgUrl = this.getMouseImageUrl();
        const mouseClass = mouseImgUrl ? 'mouse-icon has-sprite' : 'mouse-icon';
        const mouseStyle = mouseImgUrl ? `background-image: url('${mouseImgUrl}');` : '';

        this.players.forEach(p => {
            const isParent = this.parentIdx === p.id;
            const card = document.createElement('div');
            card.className = `p-2 rounded-lg pixel-border flex flex-col transition-all ${this.auction.activePlayerIdx === p.id ? 'ring-2 ring-white scale-[1.02] z-20' : 'opacity-90'}`;
            card.style.backgroundColor = p.color + '44';
            
            let miceHtml = '';
            for(let i=0; i<p.mice; i++) miceHtml += `<div class="${mouseClass}" style="${mouseStyle}"></div>`;

            let wipHtml = '';
            p.wip.forEach((job) => {
                const imgUrl = this.getCardImageUrl(job.card);
                const bgStyle = imgUrl ? `background-image: url('${imgUrl}'); background-color: transparent;` : ``;
                const textStyle = imgUrl ? `display: none;` : ``;

                wipHtml += `
                    <div class="card card-wip pixel-border text-xs p-1 flex flex-col items-center justify-center text-black" style="${bgStyle}">
                        <b class="text-[10px]" style="${textStyle}">${this.getCardName(job.card)}</b>
                        <div class="flex flex-wrap justify-center mt-1 z-10">
                            ${Array(job.miceOnCard).fill(`<div class="${mouseClass} walking scale-75" style="${mouseStyle}"></div>`).join('')}
                        </div>
                        <span class="mt-1 font-bold text-[8px] z-10 ${imgUrl ? 'text-bg-plate' : ''}">残り ${job.miceOnCard}</span>
                    </div>
                `;
            });

            let invHtml = '';
            p.inventory.forEach(item => {
                invHtml += `<span class="bg-purple-700 text-white text-[8px] px-1 rounded mr-1">${this.getCardName(item)}</span>`;
            });

            const progress = Math.min((p.score / WIN_SCORE) * 100, 100);

            card.innerHTML = `
                <div class="flex flex-col border-b border-white border-opacity-20 pb-1 mb-1">
                    <div class="flex justify-between items-center mb-0.5">
                        <span class="font-bold text-base flex items-center" style="color:${p.color}">
                            ${isParent ? '<span class="parent-tag scale-90">親</span>' : ''}
                            ${p.name}
                        </span>
                        <span class="text-lg font-black">${p.score}<span class="text-[9px] text-gray-400"> / ${WIN_SCORE}</span></span>
                    </div>
                    <div class="relative w-full h-8 mt-2 border-b-2 border-dashed border-gray-500 bg-[#2c3e50] bg-opacity-30 rounded-t-sm">
                        <div class="absolute right-0 bottom-0 text-[8px] text-gray-400 font-bold pr-1">GOAL</div>
                        <div class="absolute bottom-0 transition-all duration-500 ease-out flex flex-col items-center z-10" style="left: calc((100% - 24px) * ${progress / 100});">
                            <div class="${mouseClass} walking score-mouse" style="${mouseStyle}"></div>
                            <div class="w-4 h-[4px] mt-[1px] rounded-full mb-[1px]" style="background-color:${p.color}"></div>
                        </div>
                    </div>
                    <div class="text-[9px] text-gray-300 mt-1 text-right min-h-[14px]">${invHtml ? '所持: ' + invHtml : ''}</div>
                </div>
                <div class="mb-1 text-xs">手元: ${p.mice}匹<br/><div class="flex flex-wrap mt-0.5">${miceHtml}</div></div>
                <div class="flex gap-1 overflow-x-auto p-1 bg-black bg-opacity-30 rounded min-h-[60px]">
                    ${wipHtml || '<span class="text-gray-400 text-[10px] self-center w-full text-center">進行中なし</span>'}
                </div>
            `;
            list.appendChild(card);
        });
    }

    placeBid() {
        const amount = parseInt(document.getElementById('bidAmount').value);
        const player = this.players[this.auction.activePlayerIdx];

        if (amount > player.mice) {
            if(!player.isCPU) this.message("部下が足りません！");
            return;
        }
        if (amount <= this.auction.highestBid) {
            if(!player.isCPU) this.message("現在の最高値より高く！");
            return;
        }

        this.auction.highestBid = amount;
        this.auction.highestBidder = player;
        this.addLog(`${player.name}: ${amount}匹宣言`, "auction");
        
        this.nextTurn();
    }

    passBid() {
        const playerIdx = this.auction.activePlayerIdx;
        this.auction.participants = this.auction.participants.filter(idx => idx !== playerIdx);
        this.addLog(`${this.players[playerIdx].name}: パス`, "pass");

        if (this.auction.participants.length === 1 && this.auction.highestBidder && this.auction.participants[0] === this.auction.highestBidder.id) {
            this.resolveAuction();
        } else if (this.auction.participants.length === 0) {
            this.resolveAuction();
        } else {
            this.nextTurn();
        }
    }

    nextTurn() {
        let currentIndex = this.auction.activePlayerIdx;
        let nextIdx = -1;

        for (let i = 1; i <= this.players.length; i++) {
            let checkIdx = (currentIndex + i) % this.players.length;
            if (this.auction.participants.includes(checkIdx)) {
                nextIdx = checkIdx;
                break;
            }
        }

        if (nextIdx === -1 || (this.auction.highestBidder && nextIdx === this.auction.highestBidder.id)) {
            this.resolveAuction();
        } else {
            this.auction.activePlayerIdx = nextIdx;
            this.updateUI();
        }
    }

    resolveAuction() {
        const winner = this.auction.highestBidder;
        if (!winner) {
            this.addLog("誰も落札しませんでした。", "system");
            this.startNewRound();
            return;
        }

        this.addLog(`${winner.name}が ${this.auction.highestBid}匹で落札！`, "win");
        this.parentIdx = winner.id;

        this.players.forEach(p => {
            p.wip.forEach(job => {
                job.miceOnCard--;
                p.mice++;
            });
        });

        winner.mice -= this.auction.highestBid;
        winner.wip.push({
            card: this.currentCard,
            miceOnCard: this.auction.highestBid
        });

        this.renderPlayers();
        setTimeout(() => this.checkCompletedJobs(), 300);
    }

    async checkCompletedJobs() {
        const completed = [];
        this.players.forEach(p => {
            const finished = p.wip.filter(job => job.miceOnCard <= 0);
            p.wip = p.wip.filter(job => job.miceOnCard > 0);
            finished.forEach(f => completed.push({ player: p, card: f.card }));
        });

        if (completed.length > 0) {
            for (let job of completed) {
                await this.resolveJob(job.player, job.card);
                if (this.players.some(p => p.score >= WIN_SCORE)) {
                    break;
                }
            }
        }
        
        const isGameOver = this.players.some(p => p.score >= WIN_SCORE);
        if(!isGameOver) {
            this.startNewRound();
        } else {
            this.checkWinner();
        }
    }

    async resolveJob(player, card) {
        this.activeJob = { player, card };
        
        return new Promise(resolve => {
            const overlay = document.getElementById('modalOverlay');
            const title = document.getElementById('modalTitle');
            const dice = document.getElementById('diceDisplay');
            const reroll = document.getElementById('rerollArea');
            const okBtn = document.getElementById('modalOkBtn');
            
            overlay.classList.remove('hidden');
            title.innerText = `${player.name}の仕事完了！`;
            reroll.classList.add('hidden');
            
            if (card.type !== CARD_TYPES.NORMAL) {
                dice.classList.remove('text-5xl');
                dice.classList.add('text-2xl');
                dice.innerHTML = `<span class="text-purple-600 font-bold">${this.getCardName(card)}</span><br><span class="text-sm text-black">を能力として獲得した！</span>`;
                
                player.inventory.push(card);
                this.addLog(`${player.name}: ${this.getCardName(card)} 獲得`, "skill");
                this.renderPlayers();

                this.modalResolve = () => {
                    resolve();
                };

                if (player.isCPU) {
                    okBtn.style.display = 'none';
                    setTimeout(() => this.closeModal(), 2000);
                } else {
                    okBtn.style.display = 'inline-block';
                }
                return;
            }

            dice.innerText = "?";
            dice.classList.remove('text-2xl');
            dice.classList.add('text-5xl');
            
            const hasBigCheese = player.inventory.some(c => c.type === CARD_TYPES.BIG_CHEESE);
            okBtn.style.display = 'none';

            this.modalResolve = (val) => {
                player.score += val;
                this.addLog(`${player.name}: ${val}点獲得！`, "score");
                this.renderPlayers();
                resolve(); 
            };
            
            let rollCount = 0;
            const maxRolls = 12;
            const rollInterval = 60;

            const rollAnimation = setInterval(() => {
                dice.innerText = this.rollDice(card.value);
                rollCount++;
                
                if (rollCount >= maxRolls) {
                    clearInterval(rollAnimation);
                    
                    const finalResult = this.rollDice(card.value);
                    dice.innerText = finalResult;
                    this.lastDiceResult = finalResult;

                    if (player.isCPU) {
                        const remainingToWin = WIN_SCORE - player.score;
                        let shouldReroll = false;

                        // ゴール（40点）に到達しているなら絶対に振り直さない
                        if (finalResult < remainingToWin) {
                            const expectedAverage = card.value / 2;
                            // 期待値未満、または「振り直せばゴールに届く可能性がある」なら高確率で振り直す
                            if (finalResult <= expectedAverage || card.value >= remainingToWin) {
                                shouldReroll = Math.random() < 0.85;
                            }
                        }

                        if (hasBigCheese && shouldReroll) {
                            setTimeout(() => this.useBigCheese(), 1500);
                        } else {
                            setTimeout(() => this.closeModal(), 2000);
                        }
                    } else {
                        if (hasBigCheese) reroll.classList.remove('hidden');
                        okBtn.style.display = 'inline-block';
                    }
                }
            }, rollInterval);
        });
    }

    rollDice(sides) {
        if (sides === 2) {
            const roll = Math.floor(Math.random() * 20) + 1;
            return roll <= 10 ? 1 : 2;
        }
        return Math.floor(Math.random() * sides) + 1;
    }

    useBigCheese() {
        const { player, card } = this.activeJob;
        const bcIdx = player.inventory.findIndex(c => c.type === CARD_TYPES.BIG_CHEESE);
        if (bcIdx > -1) {
            player.inventory.splice(bcIdx, 1);
            const dice = document.getElementById('diceDisplay');
            dice.innerText = "...";
            this.addLog(`${player.name}: ビッグ・チーズを使用して振り直し！`, "skill");
            
            document.getElementById('rerollArea').classList.add('hidden');
            document.getElementById('modalOkBtn').style.display = 'none';
            
            setTimeout(() => {
                let rollCount = 0;
                const maxRolls = 12;
                const rollInterval = 60;

                const rollAnimation = setInterval(() => {
                    dice.innerText = this.rollDice(card.value);
                    rollCount++;
                    
                    if (rollCount >= maxRolls) {
                        clearInterval(rollAnimation);
                        
                        const finalResult = this.rollDice(card.value);
                        dice.innerText = finalResult;
                        this.lastDiceResult = finalResult;
                        
                        if (player.isCPU) {
                            setTimeout(() => this.closeModal(), 2000);
                        } else {
                            document.getElementById('modalOkBtn').style.display = 'inline-block';
                        }
                    }
                }, rollInterval);
            }, 500);
        }
    }

    useVeto() {
        const activePlayer = this.players[this.auction.activePlayerIdx];
        const vIdx = activePlayer.inventory.findIndex(c => c.type === CARD_TYPES.VETO);
        if (vIdx > -1) {
            activePlayer.inventory.splice(vIdx, 1);
            this.addLog(`${activePlayer.name}: 「却下(VETO)」発動！ 現在の仕事を破棄します。`, "skill");
            this.startNewRound();
        }
    }

    closeModal() {
        document.getElementById('modalOverlay').classList.add('hidden');
        if (this.modalResolve) {
            this.modalResolve(this.lastDiceResult);
            this.modalResolve = null; 
        }
    }

    checkWinner() {
        const winners = this.players.filter(p => p.score >= WIN_SCORE);
        if (winners.length > 0) {
            winners.sort((a,b) => b.score - a.score);
            this.showGameOver(winners[0]);
            return true;
        }
        return false;
    }

    showGameOver(winner) {
        clearTimeout(this.cpuTimer);
        document.getElementById('bidControls').classList.add('disabled-ui');

        localStorage.removeItem('bigCheeseSave');

        const overlay = document.getElementById('modalOverlay');
        const title = document.getElementById('modalTitle');
        const dice = document.getElementById('diceDisplay');
        const reroll = document.getElementById('rerollArea');
        const okBtn = document.getElementById('modalOkBtn');

        overlay.classList.remove('hidden');
        title.innerText = `ゲーム終了！`;
        
        dice.classList.remove('text-5xl');
        dice.classList.add('text-2xl');
        dice.innerHTML = `<div class="mt-2 text-gray-800">勝者: <span style="color:${winner.color}">${winner.name}</span></div><div class="text-3xl mt-2">${winner.score} 点</div>`;
        reroll.classList.add('hidden');
        
        okBtn.innerText = "もう一度遊ぶ";
        okBtn.style.display = 'inline-block';
        
        okBtn.onclick = () => {
            overlay.classList.add('hidden');
            okBtn.innerText = "OK"; 
            okBtn.onclick = () => game.closeModal(); 
            dice.classList.remove('text-2xl');
            dice.classList.add('text-5xl');
            
            this.players = [];
            this.deck = [];
            this.log.innerHTML = '<div class="text-gray-400">> ゲームを再開しました。</div>';
            this.init();
        };
        this.modalResolve = null;
    }

    addLog(msg, type = 'default') {
        const div = document.createElement('div');
        
        let colorClass = "text-gray-200"; 
        switch(type) {
            case 'system': colorClass = "text-gray-400"; break;
            case 'auction': colorClass = "text-blue-300"; break;
            case 'pass': colorClass = "text-red-400"; break;
            case 'win': colorClass = "text-yellow-400 font-bold"; break;
            case 'skill': colorClass = "text-purple-400 font-bold"; break;
            case 'score': colorClass = "text-green-400 font-bold"; break;
        }
        
        div.className = `mb-1 ${colorClass}`;
        div.innerText = `> ${msg}`;
        this.log.prepend(div);
    }

    message(msg) {
        const div = document.createElement('div');
        div.className = "fixed top-20 left-1/2 -translate-x-1/2 bg-red-600 text-white p-4 rounded pixel-border z-[100] pop font-bold";
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2000);
    }
}

let game;
window.onload = () => {
    game = new Game();
};

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('Service Worker registered', reg))
      .catch(err => console.error('Service Worker registration failed', err));
  });
}
